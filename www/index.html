<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Magic Kids TV v1.3.5</title>
<link rel="icon" href="Magic Kids Logo.png">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--card:#13131f;--accent:#00ccff;
  --violet:#c4a0ff;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  -webkit-tap-highlight-color:transparent;user-select:none;
  touch-action:manipulation;
}

#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

#top-bar{
  position:sticky;top:0;z-index:20;
  padding:calc(8px + var(--safe-t)) 12px 6px 12px;
  background:rgba(10,10,18,0.98);
  display:flex;flex-direction:column;gap:2px;
  flex-shrink:0;
}
#top-row{display:flex;align-items:center;gap:8px}
#top-bar .logo{width:32px;height:32px;border-radius:8px;object-fit:contain}
#top-bar .name{font-size:15px;font-weight:700;color:#fff;text-shadow:0 0 8px rgba(0,204,255,0.4)}
#top-bar .ver{font-size:11px;color:#fff;margin-left:auto;font-weight:600}
#top-bar .greeting{font-size:14px;color:var(--violet);font-weight:700;margin-top:2px;display:flex;align-items:center;gap:6px}
#top-bar .greeting #greeting-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
#top-bar .greeting .edit-name{font-size:12px;color:var(--violet);background:rgba(196,160,255,0.15);border:none;border-radius:50%;width:22px;height:22px;min-width:22px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

body.fs #top-bar,body.fs #controls-bar,body.fs #bottom-bar,body.fs #prog-section-mobile,body.fs #name-modal{display:none!important}
body.fs #video-wrap{position:fixed;top:0;bottom:0;left:0;right:0;padding-top:0;height:100%}
#chat-btn{
  background:none;border:none;color:var(--accent);font-size:18px;cursor:pointer;
  padding:4px 8px;border-radius:6px;position:relative;
}
#chat-btn .badge{
  position:absolute;top:-2px;right:-2px;background:#ff4444;color:#fff;
  border-radius:8px;padding:1px 5px;font-size:9px;display:none;
  min-width:16px;text-align:center;
}
#chat-overlay{
  position:absolute;inset:0;z-index:25;
  background:rgba(10,10,18,0.98);display:none;flex-direction:column;
}
#chat-overlay.open{display:flex}
#chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid #222;flex-shrink:0;
}
#chat-header h3{color:var(--accent);font-size:14px;font-weight:700;margin:0}
#chat-header .online{color:#888;font-size:11px;margin-left:8px}
#chat-close{
  background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px;
}
#chat-close:hover{color:#ff6666}
#chat-admin-btn{
  background:none;border:1px solid #333;border-radius:4px;
  color:#888;font-size:14px;cursor:pointer;padding:2px 6px;
}
#chat-admin-btn:hover{color:var(--accent);border-color:var(--accent)}
#chat-admin-btn.active{color:#00ff66;border-color:#00ff66}
#chat-admin-popup{
  position:absolute;top:40px;right:10px;z-index:10;
  background:#1a1a2e;border:1px solid #333;border-radius:10px;
  padding:14px;display:none;flex-direction:column;gap:8px;
  width:220px;box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
#chat-admin-popup.show{display:flex}
#chat-admin-popup p{color:#888;font-size:11px;margin:0}
#chat-admin-popup input{
  padding:8px 10px;border-radius:6px;border:1px solid #333;
  background:#0a0a1a;color:#ff6666;font-size:12px;outline:none;width:100%;
}
#chat-admin-popup input:focus{border-color:#ff6666}
#chat-admin-popup .admin-btns{display:flex;gap:6px}
#chat-admin-popup .admin-btns button{
  flex:1;padding:6px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;
}
.admin-activate{background:#7c3aed;color:#fff}
.admin-deactivate{background:rgba(255,68,68,0.2);color:#ff6666}
.admin-close{background:rgba(255,255,255,0.1);color:#888}
#chat-messages{
  flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;
}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.chat-msg{
  padding:6px 10px;border-radius:8px;
  background:rgba(255,255,255,0.04);font-size:12px;
  display:flex;flex-direction:column;gap:2px;
}
.chat-msg .msg-user{color:var(--violet);font-weight:700;font-size:11px}
.chat-msg .msg-text{color:#ddd;line-height:1.4}
.chat-msg .msg-time{color:#555;font-size:10px}
.chat-msg .msg-actions{
  display:none;gap:4px;margin-top:4px;
}
#chat-messages.chat-admin .chat-msg:hover .msg-actions{display:flex}
.chat-msg .msg-actions button{
  padding:2px 6px;border:none;border-radius:4px;font-size:10px;cursor:pointer;
}
.msg-delete{background:rgba(255,68,68,0.2);color:#ff6666}
.msg-ban{background:rgba(255,150,0,0.2);color:#ffaa00}
.chat-msg.system{background:rgba(0,204,255,0.08);border-left:2px solid var(--accent)}
.chat-msg.system .msg-text{color:var(--accent);font-style:italic}
#chat-input-area{
  padding:10px 14px;border-top:1px solid #222;
  display:flex;gap:6px;flex-shrink:0;
}
#chat-input{
  flex:1;padding:8px 12px;border-radius:8px;
  border:1px solid #333;background:#1a1a2e;color:#fff;
  font-size:12px;outline:none;
}
#chat-input:focus{border-color:var(--accent)}
#chat-input::placeholder{color:#555}
#chat-send{
  padding:8px 14px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;
}
#chat-send:disabled{opacity:0.4;cursor:not-allowed}
#chat-login{
  position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:12px;
  background:rgba(10,10,18,0.98);padding:20px;z-index:5;
}
#chat-login.hidden{display:none}
#chat-login h3{color:var(--accent);font-size:15px;margin:0}
#chat-login p{color:#888;font-size:12px;margin:0;text-align:center}
#chat-login input{
  width:100%;max-width:260px;padding:10px 12px;border-radius:8px;
  border:1px solid #333;background:#1a1a2e;color:#fff;
  font-size:13px;text-align:center;outline:none;
}
#chat-login input:focus{border-color:var(--accent)}
#chat-login button{
  padding:10px 30px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;
}

#video-wrap{
  position:relative;width:100%;background:#000;overflow:hidden;
  height:32vh;
  flex-shrink:0;
}
#video{width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.5s}
#video.visible{opacity:1}

#loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:20px;
  background:#000;z-index:5;
}
#loading .logo-load{
  width:120px;height:120px;
  border-radius:20px;
  object-fit:contain;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.95)}}
#loading .text{
  font-size:14px;font-weight:600;
  color:var(--accent);
  letter-spacing:1px;
  text-transform:uppercase;
}

#static{
  position:absolute;inset:0;
  display:none;z-index:4;
  background:repeating-radial-gradient(circle,#fff 0px,#999 1px,#111 2px,#000 3px);
  animation:noise 0.08s infinite;
}
@keyframes noise{0%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,2px)}}

#vol-indicator{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  padding:6px 16px;border-radius:20px;
  background:rgba(0,0,0,0.8);color:#00ff66;
  font-size:14px;font-weight:600;
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:10;
}

#tap-play{
  position:absolute;inset:0;display:none;z-index:6;
  justify-content:center;align-items:center;
  background:rgba(0,0,0,0.6);cursor:pointer;
}

#controls-bar{
  background:rgba(13,13,26,0.98);border-bottom:1px solid #222;
  padding:4px 12px;
  flex-shrink:0;
}
.bar-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:2px 0}
.bar-row.controls{gap:8px}

#controls-bar button{
  background:none;border:none;color:#fff;
  font-size:20px;padding:8px 12px;border-radius:8px;
  cursor:pointer;min-width:40px;min-height:40px;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
#controls-bar button:active{background:rgba(255,255,255,0.1)}
#controls-bar button.active{color:var(--accent)}
#controls-bar button.violet{color:var(--violet)}

#vol-slider{
  -webkit-appearance:none;appearance:none;
  width:80px;height:4px;border-radius:2px;
  background:#333;outline:none;
}
#vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--violet);cursor:pointer;
}

#bottom-bar{
  background:rgba(13,13,26,0.98);
  display:flex;align-items:center;justify-content:center;
  padding:6px 12px calc(6px + var(--safe-b));
  flex-shrink:0;
}

.instagram-link{
  display:flex;align-items:center;justify-content:center;
  color:var(--violet);text-decoration:none;
  padding:4px;
}
.instagram-link svg{width:20px;height:20px;fill:var(--violet)}

#prog-section-mobile{
  position:relative;
  background:var(--card);
  padding:10px 12px;
  flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;
}
#prog-section-mobile h3{color:var(--violet);font-size:13px;margin-bottom:6px;font-weight:700;flex-shrink:0}
#prog-section-mobile #prog-list-mobile{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1;min-height:0}
#prog-section-mobile .prog-item{display:flex;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px}
#prog-section-mobile .prog-item.now{background:rgba(196,160,255,0.15);border-left:3px solid #c4a0ff}
#prog-section-mobile .prog-item .hora{color:var(--accent);font-weight:700;min-width:40px}
#prog-section-mobile .prog-item .nombre{color:#ccc}
#prog-section-mobile .tz-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-shrink:0}
#prog-section-mobile .tz-row span{font-size:11px;color:#888}

#version-banner{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:10px 16px;padding-top:calc(10px + var(--safe-t));
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;text-align:center;font-size:13px;font-weight:600;
  display:none;cursor:pointer;
}

#name-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.85);
  display:none;justify-content:center;align-items:center;
}
#name-modal.show{display:flex}
#name-modal .box{
  background:var(--card);border:1px solid #333;border-radius:16px;
  padding:28px 24px;width:85%;max-width:340px;text-align:center;
}
#name-modal .box h3{
  color:var(--violet);font-size:17px;margin-bottom:6px;
}
#name-modal .box p{
  color:#888;font-size:12px;margin-bottom:16px;
}
#name-modal .box input{
  width:100%;padding:12px 14px;border-radius:10px;
  border:1px solid #444;background:#1a1a2e;color:#fff;
  font-size:15px;text-align:center;outline:none;
  margin-bottom:16px;
}
#name-modal .box input:focus{border-color:var(--violet)}
#name-modal .box button{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;
}
#name-modal .box button:active{opacity:0.8;transform:scale(0.98)}
</style>
</head>
<body>

<div id="version-banner">Nueva version disponible! Toca para descargar APK</div>

<div id="app">
  <div id="top-bar">
    <div id="top-row">
      <img class="logo" src="Magic Kids Logo.png" alt="Logo">
      <span class="name">Magic Kids TV v1.3.5</span>
      <span class="ver" id="view-counter">&#x1F441; <span id="view-count">0</span></span>
    </div>
    <div class="greeting" id="greeting"><span id="greeting-text">HOLA!</span><button class="edit-name" onclick="showNameModal(true)">&#9998;</button></div>
  </div>

  <div id="video-wrap">
    <div id="loading">
      <img class="logo-load" src="Magic Kids Logo.png" alt="Magic Kids TV">
      <div class="text">Sintonizando...</div>
    </div>
    <div id="static"></div>
    <div id="vol-indicator"></div>
    <video id="video" autoplay muted playsinline preload="auto" crossorigin="anonymous"></video>
    <div id="tap-play" style="position:absolute;inset:0;display:none;z-index:6;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);cursor:pointer;">
      <div style="text-align:center;color:#fff;">
        <div style="font-size:48px;margin-bottom:8px;">&#9654;</div>
        <div style="font-size:14px;font-weight:600;color:var(--accent);">Toca para reproducir</div>
      </div>
    </div>
  </div>

  <div id="controls-bar">
    <div class="bar-row controls">
      <button id="chat-btn" title="Chat">&#128172;<span class="badge" id="chat-badge">0</span></button>
      <button id="mute" class="violet" title="Mute">&#128266;</button>
      <input type="range" id="vol-slider" min="0" max="100" value="50">
      <button id="fullscreen" class="violet" title="Fullscreen">&#9974;</button>
    </div>
  </div>

  <div id="prog-section-mobile">
    <h3>&#128240; PROGRAMACION</h3>
    <div class="tz-row">
      <span>Zona horaria:</span>
      <select id="tz-select">
        <option value="-3">ARG (UTC-3)</option>
        <option value="-5">COL (UTC-5)</option>
        <option value="-6">MEX (UTC-6)</option>
      </select>
    </div>
    <div id="prog-list-mobile"></div>
    <div id="chat-overlay">
      <div id="chat-login">
        <h3>&#128172; Chat en Vivo</h3>
        <p>Ingresa tu nombre para chatear</p>
        <input type="text" id="chat-name-input" placeholder="Tu nombre" maxlength="20" autocomplete="off">
        <button id="chat-name-ok">ENTRAR AL CHAT</button>
      </div>
      <div id="chat-header">
        <div><h3>&#128172; Chat en Vivo</h3><span class="online" id="chat-online"></span></div>
        <div style="display:flex;align-items:center;gap:6px">
          <button id="chat-admin-btn" title="Entrar como admin">&#9881;</button>
          <button id="chat-close">&times;</button>
        </div>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="200" autocomplete="off">
        <button id="chat-send">ENVIAR</button>
      </div>
      <div id="chat-admin-popup">
        <p>Modo Admin</p>
        <input type="password" id="chat-admin-pass" placeholder="Password" autocomplete="off">
        <div class="admin-btns">
          <button class="admin-activate" id="admin-activate-btn">ACTIVAR</button>
          <button class="admin-deactivate" id="admin-deactivate-btn" style="display:none">DESACTIVAR</button>
          <button class="admin-close" id="admin-popup-close">X</button>
        </div>
      </div>
    </div>
  </div>

  <div id="bottom-bar">
    <a class="instagram-link" href="https://www.instagram.com/elmagictv" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    </a>
  </div>
</div>

<div id="name-modal">
  <div class="box">
    <h3 id="name-modal-title">Bienvenido a Magic Kids TV!</h3>
    <p>Ingresa tu nombre para personalizar</p>
    <input type="text" id="name-input" placeholder="Tu nombre" maxlength="20" autocomplete="off">
    <button id="name-ok">ENTRAR</button>
    <button id="name-cancel" style="display:none;margin-top:8px;width:100%;padding:10px;border:none;border-radius:10px;background:rgba(255,255,255,0.06);color:#888;font-size:13px;font-weight:700;cursor:pointer">Cancelar</button>
  </div>
