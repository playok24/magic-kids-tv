<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--card:#13131f;--accent:#00ccff;
  --violet:#c4a0ff;--bar-h:110px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  -webkit-tap-highlight-color:transparent;user-select:none;
  touch-action:manipulation;
}

#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding-top:calc(8px + var(--safe-t));
  padding-bottom:6px;padding-left:12px;padding-right:12px;
  background:linear-gradient(180deg,rgba(10,10,18,0.98) 70%,transparent);
  display:flex;flex-direction:column;gap:2px;
}
#top-row{display:flex;align-items:center;gap:8px}
#top-bar .logo{width:32px;height:32px;border-radius:8px;object-fit:contain}
#top-bar .name{font-size:15px;font-weight:700;color:#fff;text-shadow:0 0 8px rgba(0,204,255,0.4)}
#top-bar .ver{font-size:11px;color:#fff;margin-left:auto;font-weight:600}
#top-bar .greeting{font-size:14px;color:var(--violet);font-weight:700;margin-top:2px;display:flex;align-items:center;gap:6px}
#top-bar .greeting #greeting-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
#top-bar .greeting .edit-name{font-size:12px;color:var(--violet);background:rgba(196,160,255,0.15);border:none;border-radius:50%;width:22px;height:22px;min-width:22px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#prog-btn{
  align-self:flex-start;margin-top:2px;
  padding:4px 14px;border-radius:12px;border:none;
  background:#2a2a3a;color:var(--violet);
  font-size:11px;font-weight:700;letter-spacing:1px;
  cursor:pointer;text-transform:uppercase;
}
#prog-btn:active{transform:scale(0.95)}

body.fs #top-bar,body.fs #bottom-bar,body.fs #name-modal{display:none!important}
body.fs #video-wrap{top:0;bottom:0;left:0;right:0;padding-top:0}
#exit-fs{
  display:none;position:fixed;top:calc(16px + var(--safe-t));right:16px;z-index:100;
  width:48px;height:48px;border-radius:50%;border:none;
  background:rgba(0,0,0,0.6);color:#fff;font-size:24px;
  cursor:pointer;backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
body.fs #exit-fs{display:flex;align-items:center;justify-content:center}

#video-wrap{
  position:fixed;top:0;left:0;right:0;
  bottom:var(--bar-h);
  background:#000;overflow:hidden;
}
#video{width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.5s}
#video.visible{opacity:1}

#loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:20px;
  background:#000;z-index:5;
}
#loading .logo-load{
  width:120px;height:120px;
  border-radius:20px;
  object-fit:contain;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.95)}}
#loading .text{
  font-size:14px;font-weight:600;
  color:var(--accent);
  letter-spacing:1px;
  text-transform:uppercase;
}

#static{
  position:absolute;inset:0;
  display:none;z-index:4;
  background:repeating-radial-gradient(circle,#fff 0px,#999 1px,#111 2px,#000 3px);
  animation:noise 0.08s infinite;
}
@keyframes noise{0%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,2px)}}

#vol-indicator{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  padding:6px 16px;border-radius:20px;
  background:rgba(0,0,0,0.8);color:#fff;
  font-size:14px;font-weight:600;
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:10;
}

#tap-play{
  position:absolute;inset:0;display:none;z-index:6;
  justify-content:center;align-items:center;
  background:rgba(0,0,0,0.6);cursor:pointer;
}

#bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  height:var(--bar-h);
  padding:0 8px var(--safe-b);
  background:linear-gradient(0deg,rgba(10,10,18,0.98) 70%,transparent);
  display:flex;flex-direction:column;justify-content:flex-end;
}

.bar-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 0}
.bar-row.controls{gap:8px}

#bottom-bar button{
  background:none;border:none;color:#fff;
  font-size:20px;padding:8px 12px;border-radius:8px;
  cursor:pointer;min-width:40px;min-height:40px;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
#bottom-bar button:active{background:rgba(255,255,255,0.1)}
#bottom-bar button.active{color:var(--accent)}
#bottom-bar button.violet{color:var(--violet)}

#vol-slider{
  -webkit-appearance:none;appearance:none;
  width:80px;height:4px;border-radius:2px;
  background:#333;outline:none;
}
#vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--violet);cursor:pointer;
}

.instagram-link{
  display:flex;align-items:center;justify-content:center;
  color:var(--violet);text-decoration:none;
  padding:4px;
}
.instagram-link svg{width:20px;height:20px;fill:var(--violet)}

#programacion-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,0.95);
  display:none;flex-direction:column;
  overflow-y:auto;padding:16px;
}
#programacion-overlay.show{display:flex}
#programacion-overlay .header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
#programacion-overlay .header h2{color:var(--violet);font-size:18px}
#tz-select{
  padding:6px 10px;border-radius:8px;border:1px solid #333;
  background:#1a1a2e;color:#00ccff;font-size:12px;font-weight:700;
  cursor:pointer;outline:none;
}
#programacion-overlay .close-btn{
  background:none;border:none;color:#fff;font-size:24px;
  cursor:pointer;padding:8px;
}
.prog-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  margin-bottom:4px;transition:background 0.2s;
}
.prog-item.now{background:rgba(255,200,0,0.15);border-left:3px solid #ffd700}
.prog-item .hora{color:var(--accent);font-weight:700;font-size:13px;min-width:45px}
.prog-item .nombre{color:#ddd;font-size:13px}

#version-banner{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:10px 16px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;text-align:center;font-size:13px;font-weight:600;
  display:none;cursor:pointer;
}

#name-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.85);
  display:none;justify-content:center;align-items:center;
}
#name-modal.show{display:flex}
#name-modal .box{
  background:var(--card);border:1px solid #333;border-radius:16px;
  padding:28px 24px;width:85%;max-width:340px;text-align:center;
}
#name-modal .box h3{
  color:var(--violet);font-size:17px;margin-bottom:6px;
}
#name-modal .box p{
  color:#888;font-size:12px;margin-bottom:16px;
}
#name-modal .box input{
  width:100%;padding:12px 14px;border-radius:10px;
  border:1px solid #444;background:#1a1a2e;color:#fff;
  font-size:15px;text-align:center;outline:none;
  margin-bottom:16px;
}
#name-modal .box input:focus{border-color:var(--violet)}
#name-modal .box button{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;
}
#name-modal .box button:active{opacity:0.8;transform:scale(0.98)}
</style>
</head>

<div id="programacion-overlay">
  <div class="header">
    <h2>&#128240; Programacion</h2>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="tz-select">
        <option value="-3">ARG (UTC-3)</option>
        <option value="-5">COL (UTC-5)</option>

</div>

<div id="name-modal">

</div>

<button id="exit-fs" title="Salir pantalla completa">&#10005;</button>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
var STREAM="https://183.bozztv.com/giatv/giatv-magicplus/magicplus/chunks.m3u8";
var PROG_JSON_URL="https://playok24.github.io/magic-kids-tv/programacion.json?t="+Date.now();

var video=document.getElementById("video");
var loading=document.getElementById("loading");
var staticScreen=document.getElementById("static");
var volSlider=document.getElementById("vol-slider");
var volIndicator=document.getElementById("vol-indicator");
var viewCountEl=document.getElementById("view-count");
var greetingEl=document.getElementById("greeting");
var tapPlay=document.getElementById("tap-play");

var hlsInstance=null;
var hlsRetries=0;
var volTimeout=null;

var userName=localStorage.getItem("mk_user")||"";
var greetingText=document.getElementById("greeting-text");
function updateGreeting(){
  var h=new Date().getHours();
  var g="Buenas noches";
  if(h>=6&&h<12)g="Buenos dias";
  else if(h>=12&&h<19)g="Buenas tardes";
  greetingText.innerHTML=userName?g+", "+userName+"!":g+"!";
}
function showNameModal(editing){
  document.getElementById("name-modal").classList.add("show");
  var title=document.getElementById("name-modal-title");
  var cancel=document.getElementById("name-cancel");
  if(editing){
    title.textContent="Editar nombre";
    cancel.style.display="block";
    document.getElementById("name-input").value=userName;
  }else{
    title.textContent="Bienvenido a Magic Kids TV!";
    cancel.style.display="none";
    document.getElementById("name-input").value="";
  }
  setTimeout(function(){var inp=document.getElementById("name-input");inp.focus();},300);
}
document.getElementById("name-cancel").onclick=function(){
  document.getElementById("name-modal").classList.remove("show");
};
document.getElementById("name-ok").onclick=function(){
  var v=document.getElementById("name-input").value.trim();
  if(v){
    userName=v;
    try{localStorage.setItem("mk_user",userName);}catch(e){}
    document.getElementById("name-modal").classList.remove("show");
    updateGreeting();
  }
};
document.getElementById("name-input").onkeydown=function(e){
  if(e.key==="Enter")document.getElementById("name-ok").onclick();
};
if(!userName){
  var isAndroid=/Android/i.test(navigator.userAgent);
  if(isAndroid&&window.prompt){
    var p=prompt("¿Cual es tu nombre?");
    if(p&&p.trim()){
      userName=p.trim();
      try{localStorage.setItem("mk_user",userName);}catch(e){}
    }
  }
  if(!userName){showNameModal();}
}
updateGreeting();
setInterval(updateGreeting,60000);

var firebaseConfig={apiKey:"AIzaSyDM7YiLoP5Q-jTB1BBbMluvWL1LIPqCtxI",authDomain:"contadores-magic.firebaseapp.com",databaseURL:"https://contadores-magic-default-rtdb.firebaseio.com",projectId:"contadores-magic",storageBucket:"contadores-magic.firebasestorage.app",messagingSenderId:"58723817117",appId:"1:58723817117:web:f479abaeacf191364ae674"};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();
var sessionId="mk_"+Math.random().toString(36).substr(2,9);
var sessionRef=db.ref("sessions/"+sessionId);

sessionRef.set(firebase.database.ServerValue.TIMESTAMP);
sessionRef.onDisconnect().remove();

setInterval(function(){sessionRef.set(firebase.database.ServerValue.TIMESTAMP);},15000);

db.ref("sessions").on("value",function(snap){
  viewCountEl.textContent=snap.numChildren();
});

function cleanStaleSessions(){
  var cutoff=Date.now()-30000;
  db.ref("sessions").once("value",function(snap){
    snap.forEach(function(child){
      var val=child.val();
      if(val===true||(!val.timestamp)||val.timestamp<cutoff){
        child.ref.remove();
      }
    });
  });
}
cleanStaleSessions();
setInterval(cleanStaleSessions,20000);

window.addEventListener("beforeunload",function(){sessionRef.remove();});
window.addEventListener("pagehide",function(){sessionRef.remove();});

var programacion=[];
var tzSelect=document.getElementById("tz-select");
var tzOffset=-3;
tzSelect.value=localStorage.getItem("mk_tz")||"-3";
tzOffset=parseInt(tzSelect.value);
tzSelect.onchange=function(){
  tzOffset=parseInt(this.value);
  localStorage.setItem("mk_tz",this.value);
  renderProgramacion();
};
fetch(PROG_JSON_URL).then(function(r){return r.json()}).then(function(d){programacion=d;renderProgramacion()}).catch(function(){});

function toMin(h){
  var parts=h.split(':');
  return parseInt(parts[0])*60+parseInt(parts[1]);
}

function getNow(){
  var now=new Date();
  var utcMs=now.getTime();
  var localMs=utcMs+tzOffset*3600000;
  var h=Math.floor(((localMs%86400000)+86400000)%86400000/3600000);
  var m=Math.floor(((localMs%86400000)+86400000)%86400000%3600000/60000);
  var minActual=h*60+m;
  for(var i=0;i<programacion.length;i++){
    var actual=toMin(programacion[i].hora);
    var sig=i+1<programacion.length?toMin(programacion[i+1].hora):1440;
    if(minActual>=actual&&minActual<sig){
      return{i:i,programa:programacion[i].programa};
    }
  }
  return{i:-1,programa:'---'};
}

function renderProgramacion(){
  var overlay=document.getElementById("programacion-overlay");
  var list=document.getElementById("prog-list");
  var now=getNow();
  list.innerHTML='';
  var nowItem=null;
  programacion.forEach(function(p,i){
    var item=document.createElement("div");
    item.className="prog-item"+(i===now.i?" now":"");
    item.innerHTML='<span class="hora">'+p.hora+'</span><span class="nombre">'+p.programa+'</span>';
    list.appendChild(item);
    if(i===now.i)nowItem=item;
  });
  if(nowItem&&overlay.classList.contains("show")){
    nowItem.scrollIntoView({behavior:"smooth",block:"center"});
  }
}
setInterval(renderProgramacion,60000);

function showProgramacion(){
  var overlay=document.getElementById("programacion-overlay");
  renderProgramacion();
  overlay.classList.add("show");
  setTimeout(function(){
    var nowItem=overlay.querySelector(".prog-item.now");
    if(nowItem)nowItem.scrollIntoView({behavior:"smooth",block:"center"});
  },100);
}

document.getElementById("prog-btn").onclick=showProgramacion;
document.getElementById("close-prog").onclick=function(){
  document.getElementById("programacion-overlay").classList.remove("show");
};

function showVideo(){
  loading.style.display="none";
  staticScreen.style.display="none";
  video.classList.add("visible");
}

function showStatic(){
  loading.style.display="none";
  video.classList.remove("visible");
  video.style.opacity="0";
  staticScreen.style.display="block";
}

function showError(msg){
  loading.innerHTML='<img class="logo-load" src="Magic Kids Logo.png" alt="Magic Kids TV"><div style="color:#ff6b6b;font-size:13px;text-align:center;">'+msg+'</div>';
  loading.style.display="flex";
}

function startPlayback(){
  tapPlay.style.display="none";
  video.muted=false;
  video.volume=volSlider.value/100;
  video.play().catch(function(e){
    console.log("Play blocked, showing tap overlay:",e);
    tapPlay.style.display="flex";
  });
}

tapPlay.onclick=function(){
  video.muted=false;
  video.volume=volSlider.value/100;
  video.play().then(function(){
    tapPlay.style.display="none";
  }).catch(function(){});
};

function initHLS(){
  hlsRetries=0;
  loading.innerHTML='<img class="logo-load" src="Magic Kids Logo.png" alt="Magic Kids TV"><div class="text">Sintonizando...</div>';
  loading.style.display="flex";
  staticScreen.style.display="none";

  if(!Hls.isSupported()){
    if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src=STREAM;
      video.addEventListener("loadedmetadata",function(){startPlayback()});
    } else {
      showError("Tu navegador no soporta HLS.<br>Intenta con otro dispositivo.");
    }
    return;
  }

  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance=null;
  }

  hlsInstance=new Hls({
    enableWorker:true,
    liveSyncDuration:3,
    maxBufferLength:30,
    backBufferLength:60,
    manifestLoadingTimeOut:10000,
    manifestLoadingMaxRetry:10,
    manifestLoadingRetryDelay:1000,
    levelLoadingTimeOut:10000,
    levelLoadingMaxRetry:10,
    fragLoadingTimeOut:15000,
    fragLoadingMaxRetry:10,
    fragLoadingRetryDelay:1000,
    maxMaxBufferLength:60,
    startFragPrefetch:true
  });

  hlsInstance.loadSource(STREAM);
  hlsInstance.attachMedia(video);

  hlsInstance.on(Hls.Events.MANIFEST_PARSED,function(){
    console.log("HLS manifest parsed");
    startPlayback();
  });

  video.addEventListener("playing",showVideo);

  hlsInstance.on(Hls.Events.ERROR,function(event,data){
    console.error("HLS error:",data.type,data.details,data.fatal);
    if(!data.fatal)return;

    if(data.type===Hls.ErrorTypes.NETWORK_ERROR){
      console.log("Network error, attempting reload...");
      showError("Sin conexion. Reintentando...");
      if(hlsInstance){
        hlsInstance.startLoad();
      }
    } else if(data.type===Hls.ErrorTypes.MEDIA_ERROR){
      console.log("Media error, attempting recovery...");
      showError("Error de media. Recuperando...");
      if(hlsInstance){
        hlsInstance.recoverMediaError();
      }
    } else {
      console.log("Fatal error, full restart...");
      hlsRetries++;
      if(hlsRetries<10){
        showError("Reiniciando... ("+hlsRetries+"/10)");
        setTimeout(function(){initHLS();},3000);
      } else {
        showError("No se pudo conectar.<br>Toca para reintentar.");
        loading.onclick=function(){
          loading.onclick=null;
          hlsRetries=0;
          initHLS();
        };
      }
    }
  });

  hlsInstance.on(Hls.Events.FRAG_LOADED,function(){
    hlsRetries=0;
  });

  hlsInstance.on(Hls.Events.LEVEL_LOADED,function(){
    hlsRetries=0;
  });

  hlsInstance.startLoad();
}

var stallTimer=null;
function watchStream(){
  video.addEventListener("stalled",function(){
    console.log("Video stalled, will reload in 8s...");
    clearTimeout(stallTimer);
    stallTimer=setTimeout(function(){
      if(video.paused||video.readyState<2){
        console.log("Stream stalled too long, reloading...");
        loading.innerHTML='<img class="logo-load" src="Magic Kids Logo.png" alt="Magic Kids TV"><div class="text">Reconectando...</div>';
        loading.style.display="flex";
        video.classList.remove("visible");
        video.style.opacity="0";
        hlsRetries=0;
        initHLS();
      }
    },8000);
  });

  video.addEventListener("playing",function(){
    clearTimeout(stallTimer);
  });

  video.addEventListener("emptied",function(){
    console.log("Video emptied, stream may have dropped");
    clearTimeout(stallTimer);
    stallTimer=setTimeout(function(){
      console.log("Stream dropped, reloading...");
      loading.innerHTML='<img class="logo-load" src="Magic Kids Logo.png" alt="Magic Kids TV"><div class="text">Reconectando...</div>';
      loading.style.display="flex";
      video.classList.remove("visible");
      video.style.opacity="0";
      hlsRetries=0;
      initHLS();
    },5000);
  });
}

initHLS();
watchStream();

document.getElementById("play").onclick=function(){
  video.muted=false;
  video.play();
  video.classList.add("visible");
};
document.getElementById("pause").onclick=function(){
  video.pause();
};
document.getElementById("mute").onclick=function(){
  video.muted=!video.muted;
  this.innerHTML=video.muted?"&#128264;":"&#128266;";
};
volSlider.oninput=function(){
  video.volume=this.value/100;
  video.muted=false;
  showVolIndicator("Vol: "+this.value+"%");
};
var isFs=false;
function toggleFullscreen(){
  isFs=!isFs;
  if(isFs){
    document.body.classList.add("fs");
    if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.StatusBar){
      window.Capacitor.Plugins.StatusBar.hide();
    }
    try{document.documentElement.requestFullscreen();}catch(e){}
  } else {
    document.body.classList.remove("fs");
    if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.StatusBar){
      window.Capacitor.Plugins.StatusBar.show();
      window.Capacitor.Plugins.StatusBar.setOverlaysWebView({overlay:true});
      window.Capacitor.Plugins.StatusBar.setStyle({style:'DARK'});
    }
    try{document.exitFullscreen();}catch(e){}
  }
}
document.getElementById("fullscreen").onclick=toggleFullscreen;
document.getElementById("exit-fs").onclick=toggleFullscreen;
document.getElementById("ch-down").onclick=function(){
  showVolIndicator("Canal abajo...");
  video.classList.remove("visible");
  loading.innerHTML='<img class="logo-load" src="Magic Kids Logo.png" alt="Magic Kids TV"><div class="text">Cambiando canal...</div>';
  loading.style.display="flex";
  initHLS();
};
document.getElementById("ch-up").onclick=function(){
  showVolIndicator("Canal arriba...");
  video.classList.remove("visible");
  loading.innerHTML='<img class="logo-load" src="Magic Kids Logo.png" alt="Magic Kids TV"><div class="text">Cambiando canal...</div>';
  loading.style.display="flex";
  initHLS();
};

function showVolIndicator(txt){
  volIndicator.textContent=txt;
  volIndicator.style.opacity="1";
  clearTimeout(volTimeout);
  volTimeout=setTimeout(function(){volIndicator.style.opacity="0";},1500);
}

document.addEventListener("keydown",function(e){
  if(e.key==="ArrowUp"){volSlider.value=Math.min(100,parseInt(volSlider.value)+5);volSlider.oninput();}
  if(e.key==="ArrowDown"){volSlider.value=Math.max(0,parseInt(volSlider.value)-5);volSlider.oninput();}
  if(e.key===" "||e.key==="k"){video.paused?video.play():video.pause();}
  if(e.key==="f"){document.getElementById("fullscreen").click();}
  if(e.key==="m"){document.getElementById("mute").onclick();}
});

var VERSION_JSON_URL="https://playok24.github.io/magic-kids-tv/version.json";
function checkVersion(){
  fetch(VERSION_JSON_URL+"?t="+Date.now()).then(function(r){return r.json()}).then(function(d){
    if(d.version&&d.version!=="1.2"){
      document.getElementById("version-banner").style.display="block";
    }
  }).catch(function(){});
}
checkVersion();
setInterval(checkVersion,60000);

if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.StatusBar){
  window.Capacitor.Plugins.StatusBar.setOverlaysWebView({overlay:true});
  window.Capacitor.Plugins.StatusBar.setStyle({style:'DARK'});
  window.Capacitor.Plugins.StatusBar.setBackgroundColor({color:'#00000000'});
}
</script>
