<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Kids Television</title>
<link rel="icon" href="www/Magic Kids Logo.png">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 50%,#0a0a1a 100%);
  color:#fff;font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
}
#header-bar{
  background:rgba(10,10,26,0.95);border-bottom:1px solid #222;
  padding:8px 16px;display:flex;align-items:center;gap:12px;
  min-height:44px;position:relative;z-index:10;
}
#header-bar .logo{width:32px;height:32px;border-radius:6px}
#header-bar .title{color:#c4a0ff;font-size:16px;font-weight:700}
#header-bar .greeting{color:#888;font-size:12px;margin-left:auto;display:flex;align-items:center;gap:6px}
#header-bar .greeting .edit-name{font-size:11px;color:#888;background:rgba(255,255,255,0.1);border:none;border-radius:4px;padding:2px 6px;cursor:pointer}
#header-bar .greeting .edit-name:hover{color:var(--violet);background:rgba(196,160,255,0.15)}
#header-bar .version{color:#555;font-size:11px}
#update-btn{
  display:none;padding:4px 12px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;border:none;border-radius:4px;cursor:pointer;
  font-size:11px;font-weight:bold;
}
#container{display:flex;flex:1;overflow:hidden}
#screen{
  flex:1;position:relative;background:#000;
  display:flex;align-items:center;justify-content:center;
  min-width:0;
}
#loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:20px;
  background:#000;z-index:3;
}
#loading .logo-load{
  width:140px;height:140px;
  border-radius:20px;
  object-fit:contain;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.95)}}
#loading .load-text{
  color:#00ff66;font-size:18px;font-weight:bold;
  text-shadow:0 0 10px #00ff66;
  text-transform:uppercase;letter-spacing:1px;
}
#static{
  position:absolute;inset:0;display:none;z-index:2;
  background:repeating-radial-gradient(circle,#fff 0px,#999 1px,#111 2px,#000 3px);
  animation:noise .08s infinite;
}
@keyframes noise{0%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,2px)}}
#video{width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity .5s}
#video.visible{opacity:1}
#view-counter{
  position:absolute;top:10px;right:10px;
  background:rgba(0,0,0,0.7);padding:4px 10px;border-radius:12px;
  font-size:12px;color:#fff;z-index:5;
}
#vol-indicator{
  position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  padding:6px 16px;border-radius:20px;
  background:rgba(0,0,0,0.8);color:#00ff66;
  font-size:14px;font-weight:600;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:10;
}
#remote{
  width:300px;background:rgba(13,13,26,0.98);
  border-left:1px solid #222;padding:12px;
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;scrollbar-width:none;
}
#remote::-webkit-scrollbar{display:none}
.row{display:flex;gap:6px}
#remote button{
  flex:1;padding:10px 6px;border:1px solid #333;border-radius:8px;
  background:rgba(255,255,255,0.04);color:#ccc;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;
}
#remote button:hover{background:rgba(0,204,255,0.1);border-color:#00ccff;color:#fff}
#remote button:active{transform:scale(0.95)}
#remote button.play-btn{background:rgba(0,204,255,0.15);border-color:#00ccff;color:#00ccff}
#remote button.danger{border-color:#ff4444;color:#ff6666}
#prog-section{margin-top:8px}
#prog-section h3{color:#c4a0ff;font-size:13px;margin-bottom:6px;font-weight:700}
#prog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
#prog-header h3{margin:0}
#tz-select{
  width:100%;padding:8px;border-radius:8px;border:1px solid #333;
  background:#1a1a2e;color:#00ccff;font-size:12px;font-weight:700;
  cursor:pointer;outline:none;text-align:center;
}
#prog-list{display:flex;flex-direction:column;gap:2px;max-height:300px;overflow-y:auto}
.prog-item{display:flex;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px}
.prog-item.now{background:rgba(196,160,255,0.15);border-left:3px solid #c4a0ff}
.prog-item .h{color:#00ccff;font-weight:700;min-width:40px}
.prog-item .n{color:#ccc}
.vol-row{display:flex;align-items:center;gap:6px}
.vol-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;background:#333;outline:none;
}
.vol-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#00ccff;cursor:pointer;
}
#version-banner{
  position:fixed;top:44px;left:0;right:0;z-index:100;
  padding:10px 16px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;text-align:center;font-size:13px;font-weight:600;
  display:none;flex-direction:column;align-items:center;gap:6px;
}
#version-banner .update-row{display:flex;align-items:center;gap:10px}
#version-banner .progress-bar{
  width:200px;height:6px;border-radius:3px;background:rgba(255,255,255,0.2);overflow:hidden;
}
#version-banner .progress-fill{
  height:100%;width:0%;background:#00ff66;border-radius:3px;transition:width 0.3s;
}
#version-banner button{
  padding:4px 14px;border:none;border-radius:6px;cursor:pointer;
  font-size:12px;font-weight:700;
}
#version-banner .install-btn{background:#00ff66;color:#000;display:none}
#version-banner .dismiss-btn{background:rgba(255,255,255,0.15);color:#fff}
#name-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.85);
  display:none;justify-content:center;align-items:center;
}
#name-modal.show{display:flex}
#name-modal .box{
  background:#13131f;border:1px solid #333;border-radius:16px;
  padding:28px 24px;width:85%;max-width:340px;text-align:center;
}
#name-modal .box h3{color:#c4a0ff;font-size:17px;margin-bottom:6px}
#name-modal .box p{color:#888;font-size:12px;margin-bottom:16px}
#name-modal .box input{
  width:100%;padding:12px 14px;border-radius:10px;
  border:1px solid #444;background:#1a1a2e;color:#fff;
  font-size:15px;text-align:center;outline:none;margin-bottom:16px;
}
#name-modal .box input:focus{border-color:#c4a0ff}
#name-modal .box button{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;
}
#name-modal .box button:active{opacity:0.8;transform:scale(0.98)}

body.video-only #header-bar,body.video-only #remote,body.video-only #chat-overlay{display:none}
body.video-only #container{flex:1}
body.video-only #screen{width:100vw}

#chat-btn{
  width:100%;padding:10px;border:1px solid #333;border-radius:8px;
  background:rgba(255,255,255,0.04);color:#00ccff;
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all .15s;text-align:center;
}
#chat-btn:hover{background:rgba(0,204,255,0.1);border-color:#00ccff}
#chat-btn .badge{background:#ff4444;color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;margin-left:4px;display:none}

#links-bar{display:flex;gap:8px;justify-content:center;padding:4px 0}
#links-bar a{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1px solid #333;transition:all .15s}
#links-bar a:hover{background:rgba(0,204,255,0.1);border-color:#00ccff}
#links-bar a svg{width:20px;height:20px;fill:#999}
#links-bar a:hover svg{fill:#00ccff}

#chat-overlay{
  position:fixed;top:80px;left:400px;z-index:150;
  width:380px;height:500px;
  background:rgba(13,13,26,0.98);border:1px solid #333;border-radius:12px;
  display:none;flex-direction:column;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
#chat-overlay.open{display:flex}
#chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid #222;
  cursor:grab;user-select:none;
}
#chat-header:active{cursor:grabbing}
#chat-header h3{color:#00ccff;font-size:14px;font-weight:700;margin:0}
#chat-header .online{color:#888;font-size:11px;margin-left:8px}
#chat-close{
  background:none;border:none;color:#888;font-size:18px;cursor:pointer;
  padding:2px 6px;border-radius:4px;
}
#chat-close:hover{color:#ff6666;background:rgba(255,68,68,0.1)}
#chat-admin-btn{
  background:none;border:1px solid #333;border-radius:4px;
  color:#888;font-size:14px;cursor:pointer;padding:2px 6px;
}
#chat-admin-btn:hover{color:#00ccff;border-color:#00ccff}
#chat-admin-btn.active{color:#00ff66;border-color:#00ff66}

#chat-admin-popup{
  position:absolute;top:40px;right:10px;z-index:10;
  background:#1a1a2e;border:1px solid #333;border-radius:10px;
  padding:14px;display:none;flex-direction:column;gap:8px;
  width:220px;box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
#chat-admin-popup.show{display:flex}
#chat-admin-popup p{color:#888;font-size:11px;margin:0}
#chat-admin-popup input{
  padding:8px 10px;border-radius:6px;border:1px solid #333;
  background:#0a0a1a;color:#ff6666;font-size:12px;outline:none;width:100%;
}
#chat-admin-popup input:focus{border-color:#ff6666}
#chat-admin-popup .admin-btns{display:flex;gap:6px}
#chat-admin-popup .admin-btns button{
  flex:1;padding:6px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;
}
.admin-activate{background:#7c3aed;color:#fff}
.admin-activate:hover{background:#6d28d9}
.admin-deactivate{background:rgba(255,68,68,0.2);color:#ff6666}
.admin-deactivate:hover{background:rgba(255,68,68,0.4)}
.admin-close{background:rgba(255,255,255,0.1);color:#888}
.admin-close:hover{background:rgba(255,255,255,0.2)}

#chat-messages{
  flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;
}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.chat-msg{
  position:relative;padding:6px 10px;border-radius:8px;
  background:rgba(255,255,255,0.04);font-size:12px;
  display:flex;flex-direction:column;gap:2px;
}
.chat-msg .msg-user{color:#c4a0ff;font-weight:700;font-size:11px}
.chat-msg .msg-text{color:#ddd;line-height:1.4}
.chat-msg .msg-time{color:#555;font-size:10px}
.chat-msg .msg-actions{
  position:absolute;top:4px;right:4px;display:none;gap:4px;
}
#chat-messages.chat-admin .chat-msg:hover .msg-actions{display:flex}
.chat-msg .msg-actions button{
  width:22px;height:22px;border:none;border-radius:4px;
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.msg-delete{background:rgba(255,68,68,0.2);color:#ff6666}
.msg-delete:hover{background:rgba(255,68,68,0.4)}
.msg-ban{background:rgba(255,150,0,0.2);color:#ffaa00}
.msg-ban:hover{background:rgba(255,150,0,0.4)}

.chat-msg.system{background:rgba(0,204,255,0.08);border-left:2px solid #00ccff}
.chat-msg.system .msg-text{color:#00ccff;font-style:italic}

#chat-input-area{
  padding:10px 14px;border-top:1px solid #222;
  display:flex;gap:6px;
}
#chat-input{
  flex:1;padding:8px 12px;border-radius:8px;
  border:1px solid #333;background:#1a1a2e;color:#fff;
  font-size:12px;outline:none;
}
#chat-input:focus{border-color:#00ccff}
#chat-input::placeholder{color:#555}
#chat-send{
  padding:8px 14px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;
}
#chat-send:hover{opacity:0.85}
#chat-send:disabled{opacity:0.4;cursor:not-allowed}

#chat-login{
  position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:12px;
  background:rgba(13,13,26,0.98);border-radius:12px;padding:20px;z-index:5;
}
#chat-login.hidden{display:none}
#chat-login h3{color:#00ccff;font-size:15px;margin:0}
#chat-login p{color:#888;font-size:12px;margin:0;text-align:center}
#chat-login input{
  width:100%;max-width:260px;padding:10px 12px;border-radius:8px;
  border:1px solid #333;background:#1a1a2e;color:#fff;
  font-size:13px;text-align:center;outline:none;
}
#chat-login input:focus{border-color:#00ccff}
#chat-login button{
  padding:10px 30px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;
}
#chat-login button:hover{opacity:0.85}

.chat-msg .msg-text .banned-tag{color:#ff6666;font-size:10px;font-weight:700}

#exit-video{
  display:none;position:fixed;top:16px;right:16px;z-index:50;
  width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(0,0,0,0.6);color:#fff;font-size:20px;
  cursor:pointer;opacity:0;transition:opacity 0.3s;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
body.video-only #exit-video{display:block}
body.video-only:hover #exit-video{opacity:1}
</style>
</head>

<script>
const STREAM="https://183.bozztv.com/giatv/giatv-magicplus/magicplus/chunks.m3u8";
const PROG_JSON_URL="https://playok24.github.io/magic-kids-tv/programacion.json?t="+Date.now();

const video=document.getElementById("video");

function cleanStaleSessions(){
  var cutoff=Date.now()-120000;
  db.ref("sessions").once("value",function(snap){
    snap.forEach(function(child){
      var val=child.val();
      if(val===true||!val.localTs||val.localTs<cutoff){
        child.ref.remove();
      }
    });
  });
}

function toMin(h){
  const p=h.split(':');
  return parseInt(p[0])*60+parseInt(p[1]);
}

function getNow(){
  const now=new Date();
  const utcMs=now.getTime();
  const localMs=utcMs+tzOffset*3600000;
  const h=Math.floor(((localMs%86400000)+86400000)%86400000/3600000);
  const m=Math.floor(((localMs%86400000)+86400000)%86400000%3600000/60000);
  const minActual=h*60+m;
  for(let i=0;i<programacion.length;i++){
    const actual=toMin(programacion[i].hora);
    const sig=i+1<programacion.length?toMin(programacion[i+1].hora):1440;
    if(minActual>=actual&&minActual<sig)return{i:i,programa:programacion[i].programa};
  }
  return{i:-1,programa:'---'};
}

function renderProgramacion(){
  const list=document.getElementById("prog-list");
  const now=getNow();
  list.innerHTML='';
  let nowItem=null;
  programacion.forEach((p,i)=>{
    const item=document.createElement("div");
    item.className="prog-item"+(i===now.i?" now":"");
    item.innerHTML=`<span class="h">${p.hora}</span><span class="n">${p.programa}</span>`;
    list.appendChild(item);
    if(i===now.i)nowItem=item;
  });
  if(nowItem){
    nowItem.scrollIntoView({behavior:"smooth",block:"center"});
  }
}
setInterval(renderProgramacion,60000);

function initHLS(){
  stopFreezeWatchdog();
  hlsRetries=0;
  loading.innerHTML='<img class="logo-load" src="www/Magic Kids Logo.png" alt="Magic Kids TV"><div class="load-text">Sintonizando...</div>';
  loading.style.display="flex";
  staticScreen.style.display="none";

  if(!Hls.isSupported()){
    if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src=STREAM;
      video.addEventListener("loadedmetadata",()=>startPlayback());
    } else {
      showError("Tu navegador no soporta HLS.");
    }
    return;
  }

  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance=null;
  }

  hlsInstance=new Hls({
    enableWorker:true,
    liveSyncDuration:30,
    liveSyncDurationCount:7,
    maxBufferLength:60,
    maxMaxBufferLength:120,
    backBufferLength:30,
    liveDurationInfinity:true,
    maxBufferHole:3,
    maxStarvationDelay:10,
    manifestLoadingTimeOut:20000,
    manifestLoadingMaxRetry:20,
    manifestLoadingRetryDelay:2000,
    levelLoadingTimeOut:20000,
    levelLoadingMaxRetry:20,
    fragLoadingTimeOut:30000,
    fragLoadingMaxRetry:20,
    fragLoadingRetryDelay:2000,
    startFragPrefetch:true,
    stretchShortVideoSegment:true,
    lowLatencyMode:false,
    nudgeOffset:1.5,
    nudgeMaxRetry:10,
    enableSoftwareAES:true,
    capLevelToPlayerSize:true,
    abrEwmaDefaultEstimate:5000000,
    abrEwmaFastVoD:3,
    abrEwmaSlowVoD:10
  });

  hlsInstance.loadSource(STREAM);
  hlsInstance.attachMedia(video);

  hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{
    console.log("HLS manifest parsed");
    startPlayback();
  });

  video.addEventListener("playing",showVideo);

  hlsInstance.on(Hls.Events.ERROR,(event,data)=>{
    if(!data.fatal)return;

    if(data.type===Hls.ErrorTypes.NETWORK_ERROR){
      showError("Sin conexion. Reintentando...");
      hlsRetries++;
      if(hlsRetries<15){
        setTimeout(()=>{
          if(hlsInstance){hlsInstance.startLoad();}
        },2000*Math.min(hlsRetries,5));
      } else {
        showError("No se pudo conectar.<br>Haz clic para reintentar.");
        loading.onclick=()=>{loading.onclick=null;hlsRetries=0;initHLS();};
      }
    } else if(data.type===Hls.ErrorTypes.MEDIA_ERROR){
      showError("Error de media. Recuperando...");
      if(hlsInstance)hlsInstance.recoverMediaError();
    } else {
      hlsRetries++;
      if(hlsRetries<10){
        showError(`Reiniciando... (${hlsRetries}/10)`);
        setTimeout(()=>initHLS(),3000*Math.min(hlsRetries,4));
      } else {
        showError("No se pudo conectar.<br>Haz clic en RECONECTAR.");
        loading.onclick=()=>{loading.onclick=null;hlsRetries=0;initHLS();};
      }
    }
  });

  hlsInstance.on(Hls.Events.FRAG_LOADED,()=>{hlsRetries=0;});
  hlsInstance.on(Hls.Events.LEVEL_LOADED,()=>{hlsRetries=0;});

  hlsInstance.startLoad();
}

let freezeWatchdog=null;
let lastTime=0;
let freezeCount=0;
function startFreezeWatchdog(){
  stopFreezeWatchdog();
  lastTime=video.currentTime||0;
  freezeCount=0;
  freezeWatchdog=setInterval(()=>{
    if(video.paused||video.ended)return;
    var ct=video.currentTime||0;
    if(Math.abs(ct-lastTime)<0.3){
      freezeCount++;
      if(freezeCount>=5){
        freezeCount=0;
        video.play().catch(function(){});
        if(video.readyState<2){
          hlsRetries=0;
          initHLS();
        }else if(hlsInstance){
          hlsInstance.recoverMediaError();
        }
      }
    }else{
      freezeCount=0;
    }
    lastTime=ct;
  },2000);
}
function stopFreezeWatchdog(){
  clearInterval(freezeWatchdog);
  freezeWatchdog=null;
}

initHLS();

video.addEventListener("pause",function(){stopFreezeWatchdog();});

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"){volSlider.value=Math.min(100,parseInt(volSlider.value)+5);volSlider.oninput();}
  if(e.key==="ArrowDown"){volSlider.value=Math.max(0,parseInt(volSlider.value)-5);volSlider.oninput();}
  if(e.key===" "||e.key==="k"){e.preventDefault();video.paused?video.play():video.pause();}
  if(e.key==="f"){document.getElementById("fullscreen").onclick();}
  if(e.key==="m"){document.getElementById("mute").onclick();}
  if(e.key==="Escape"&&document.body.classList.contains("video-only")){
    if(window.electronAPI){window.electronAPI.fullscreenExit();}
    else{if(document.fullscreenElement)document.exitFullscreen();}
    document.body.classList.remove("video-only");
  }
});

var chatHeaderEl=document.getElementById("chat-header");
var dragOffsetX=0,dragOffsetY=0,dragging=false;
chatHeaderEl.addEventListener("mousedown",function(e){
  if(e.target.id==="chat-close")return;
  dragging=true;
  var rect=chatOverlay.getBoundingClientRect();
  dragOffsetX=e.clientX-rect.left;
  dragOffsetY=e.clientY-rect.top;
  chatOverlay.style.transition="none";
  e.preventDefault();
});
document.addEventListener("mousemove",function(e){
  if(!dragging)return;
  var x=e.clientX-dragOffsetX;
  var y=e.clientY-dragOffsetY;
  x=Math.max(0,Math.min(window.innerWidth-chatOverlay.offsetWidth,x));
  y=Math.max(0,Math.min(window.innerHeight-chatOverlay.offsetHeight,y));
  chatOverlay.style.left=x+"px";
  chatOverlay.style.top=y+"px";
  chatOverlay.style.right="auto";
  chatOverlay.style.bottom="auto";
});
document.addEventListener("mouseup",function(){dragging=false;});

  }
});

function scrollChat(){
  chatMessages.scrollTop=chatMessages.scrollHeight;
}

function formatChatTime(ts){
  var d=new Date(ts);
  var h=d.getHours().toString().padStart(2,"0");
  var m=d.getMinutes().toString().padStart(2,"0");
  return h+":"+m;
}

function renderChatMsg(msg){
  var div=document.createElement("div");
  div.className="chat-msg"+(msg.system?" system":"");
  div.dataset.id=msg.id;
  div.dataset.uid=msg.uid||"";
  if(msg.system){
    div.innerHTML='<span class="msg-text">'+msg.text+'</span>';
  }else{
    div.innerHTML='<span class="msg-user">'+msg.user+'</span>'
      +'<span class="msg-text">'+msg.text+'</span>'
      +'<span class="msg-time">'+formatChatTime(msg.timestamp)+'</span>'
      +'<div class="msg-actions">'
      +'<button class="msg-delete" title="Borrar">&#128465;</button>'
      +'<button class="msg-ban" title="Banear">&#128683;</button>'
      +'</div>';
    div.querySelector(".msg-delete").onclick=function(){
      chatMessagesRef.child(msg.id).remove();
    };
    div.querySelector(".msg-ban").onclick=function(){
      if(confirm("Banear a "+msg.user+" del chat?")){
        chatBannedRef.child(msg.uid).set(true);
        chatMessagesRef.child(msg.id).remove();
        chatMessagesRef.push({system:true,text:"🚫 "+msg.user+" ha sido bloqueado del chat",timestamp:firebase.database.ServerValue.TIMESTAMP});
      }
    };
  }
  chatMessages.appendChild(div);
}

chatMessagesRef.orderByChild("timestamp").limitToLast(50).on("child_added",function(snap){
  var msg=snap.val();
  msg.id=snap.key;
  renderChatMsg(msg);
  scrollChat();
  if(!chatOpen&&!msg.system){
    unreadCount++;
    chatBadge.textContent=unreadCount;
    chatBadge.style.display="inline";
  }
});

chatMessagesRef.orderByChild("timestamp").limitToLast(50).on("child_removed",function(snap){
  var el=chatMessages.querySelector('[data-id="'+snap.key+'"]');
  if(el)el.remove();
});

  var cutoff=Date.now()-6*3600*1000;

function sendChatMessage(){
  var text=chatInput.value.trim();
  if(!text)return;
  if(!userName){showNameModal(true);return;}
  chatBannedRef.child(chatSessionId).once("value",function(snap){
    if(snap.exists()){
      chatInput.disabled=true;
      chatSend.disabled=true;
      chatInput.placeholder="Has sido bloqueado del chat";
      return;
    }
    chatMessagesRef.push({
      user:userName,
      text:text,
      uid:chatSessionId,
      timestamp:firebase.database.ServerValue.TIMESTAMP
    });
    chatInput.value="";
  });
}
